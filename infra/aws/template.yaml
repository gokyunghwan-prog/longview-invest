  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateGitHubOidcProviderCondition
                - !Ref GitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub >-
                  repo:${GitHubRepository}:environment:${GitHubDeployEnvironment}
      Policies:
        - PolicyName: push-image-and-update-this-stack
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: GetEcrAuthorizationToken
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: PushOnlyThisRepository
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:CompleteLayerUpload
                  - ecr:DescribeImages
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:ListImages
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: !GetAtt ContainerRepository.Arn
              - Sid: UploadLargeTemplateToPrivateDeploymentPrefix
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub ${SnapshotBucket.Arn}/deployment/*
              - Sid: LocateDeploymentBucket
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                Resource: !GetAtt SnapshotBucket.Arn
              - Sid: ListPrivateDeploymentPrefix
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt SnapshotBucket.Arn
                Condition:
                  StringLike:
                    s3:prefix:
                      - deployment/*
              - Sid: InspectAndUpdateOnlyThisStack
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplate
                Resource:
                  - !Sub >-
                    arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*
                  - !Sub >-
                    arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:changeSet/*/*
              - Sid: InspectUploadedTemplateBeforeChangeSet
                Effect: Allow
                Action:
                  - cloudformation:GetTemplateSummary
                Resource: "*"
              - Sid: PassOnlyThisCloudFormationExecutionRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt CloudFormationExecutionRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: cloudformation.amazonaws.com
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  GitHubBootstrapRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateGitHubOidcProviderCondition
                - !Ref GitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub >-
                  repo:${GitHubRepository}:environment:${GitHubDeployEnvironment}
      Policies:
        - PolicyName: bootstrap-secrets-and-state
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: InspectOnlyThisStack
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub >-
                  arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*
              - Sid: SeedOnlyAutotradeSecrets
                Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:PutSecretValue
                Resource:
                  - !Ref KisCredentialsSecret
                  - !Ref MarketDataCredentialsSecret
              - Sid: MigrateOnlyAutotradeState
                Effect: Allow
                Action:
                  - dynamodb:DeleteItem
                  - dynamodb:DescribeTable
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt AutotradeStateTable.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  Region:
    Description: Deploy and run this stack in the Seoul region.
    Value: !Ref AWS::Region

  EcrRepositoryUri:
    Description: Push commit-SHA-tagged images here.
    Value: !GetAtt ContainerRepository.RepositoryUri

  EcrRepositoryName:
    Value: !Ref ContainerRepository

  StateMachineArn:
    Description: Use this for safe manual dry-run StartExecution tests.
    Value: !Ref AutotradeStateMachine

  DataSyncStateMachineArn:
    Description: Runs only the two-hour sync and atomic publication command.
    Value: !Ref DataSyncStateMachine

  EcsClusterArn:
    Value: !GetAtt EcsCluster.Arn

  TradingTaskDefinitionArn:
    Value: !Ref TradingTaskDefinition

  DataSyncTaskDefinitionArn:
    Value: !Ref DataSyncTaskDefinition

  StateTableName:
    Value: !Ref AutotradeStateTable

  SnapshotBucketName:
    Value: !Ref SnapshotBucket

  SnapshotPublicBaseUrl:
    Description: Read-only CloudFront base URL for validated snapshot artifacts.
    Value: !Sub https://${SnapshotDistribution.DomainName}

  LatestManifestUrl:
    Description: >-
      The website reads this small manifest, then the immutable revision paths
      and checksums named by it.
    Value: !Sub https://${SnapshotDistribution.DomainName}/latest/manifest.json

  KisSecretArn:
    Description: Populate this secret out of band; it initially has no value.
    Value: !Ref KisCredentialsSecret

  MarketDataSecretArn:
    Description: Populate DART and data.go.kr credentials out of band.
    Value: !Ref MarketDataCredentialsSecret

  KillSwitchParameterName:
    Description: true blocks live orders. The initial value is true.
    Value: !Ref KillSwitchParameter

  AlertTopicArn:
    Value: !Ref AlertTopic

  SchedulerDeadLetterQueueUrl:
    Value: !Ref SchedulerDeadLetterQueue

  GitHubDeployRoleArn:
    Description: Store as the non-secret GitHub variable AWS_DEPLOY_ROLE_ARN.
    Value: !GetAtt GitHubDeployRole.Arn

  GitHubBootstrapRoleArn:
    Description: >-
      Use for the one-time manual GitHub bootstrap that seeds Secrets Manager
      and migrates legacy state.
    Value: !GetAtt GitHubBootstrapRole.Arn

  CloudFormationExecutionRoleArn:
    Description: >-
      Store as the non-secret GitHub variable AWS_CLOUDFORMATION_ROLE_ARN.
    Value: !GetAtt CloudFormationExecutionRole.Arn

  SafetyStatus:
    Value: !Sub >-
      executionMode=${ExecutionMode}, tradingSchedule=${EnableTradingSchedule},
      dataSchedule=${EnableDataSyncSchedule}, durableKillSwitch=true-at-bootstrap
