name: Daily Korean market sync

on:
  schedule:
    # 19:35, 22:35, 다음 날 01:35 KST. GitHub 예약 지연·누락을 후속 실행이 보완합니다.
    # 각 성공 실행은 당일 검증 revision을 게시하고, concurrency가 겹치는 수집을 직렬화합니다.
    - cron: "35 10,13,16 * * *"
  workflow_dispatch:

concurrency:
  group: korean-market-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Restore DART universe checkpoints
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: data/dart-market
          key: dart-market-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dart-market-${{ runner.os }}-

      - name: Validate collectors and scoring
        run: npm run check

      - name: Preserve previous public snapshot baseline
        run: |
          if [ -f data/companies.json ]; then
            cp data/companies.json "$RUNNER_TEMP/previous-companies.json"
          fi

      - name: Sync KOSPI and KOSDAQ
        id: market_sync
        continue-on-error: true
        run: npm run sync:daily
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          ALLOW_PRICE_PROVIDER_FAILURE: "true"

      - name: Verify configured price providers before publishing
        id: price_validation
        if: steps.market_sync.outcome == 'success'
        continue-on-error: true
        run: npm run verify:prices
        env:
          REQUIRE_KR_PRICE_PROVIDER: "true"

      - name: Generate the shared website and autotrade selection
        id: selection_generation
        if: steps.market_sync.outcome == 'success' && steps.price_validation.outcome == 'success'
        continue-on-error: true
        run: npm run generate:selection

      - name: Validate generated snapshot
        id: snapshot_validation
        if: steps.market_sync.outcome == 'success' && steps.price_validation.outcome == 'success' && steps.selection_generation.outcome == 'success'
        run: |
          if [ -f "$RUNNER_TEMP/previous-companies.json" ]; then
            npm run validate:snapshot -- --previous "$RUNNER_TEMP/previous-companies.json"
          else
            npm run validate:snapshot
          fi

      - name: Upload sync diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: korean-market-sync-diagnostics-${{ github.run_id }}
          path: |
            data/sync-diagnostics.json
            data/price-sync-diagnostics.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit updated public snapshot
        if: steps.market_sync.outcome == 'success' && steps.price_validation.outcome == 'success' && steps.selection_generation.outcome == 'success' && steps.snapshot_validation.outcome == 'success'
        run: |
          if [ -z "$(git status --porcelain -- data/companies.json data/trading-selection.json)" ]; then
            echo "No public snapshot changes"
            exit 0
          fi
          git config user.name "longview-data-bot"
          git config user.email "longview-data-bot@users.noreply.github.com"
          git add data/companies.json data/trading-selection.json
          git commit -m "data: daily Korean market snapshot and selection"
          git push

      - name: Save DART universe checkpoints
        if: always()
        continue-on-error: true
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: data/dart-market
          key: dart-market-${{ runner.os }}-${{ github.run_id }}

      - name: Fail when the Korean market collector failed
        if: steps.market_sync.outcome == 'failure'
        run: exit 1

      - name: Fail when a configured price provider failed
        if: steps.market_sync.outcome == 'success' && steps.price_validation.outcome == 'failure'
        run: exit 1

      - name: Fail when the shared investment selection failed
        if: steps.selection_generation.outcome == 'failure'
        run: exit 1
