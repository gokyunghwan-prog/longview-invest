name: Validate Longview AWS runtime

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "autotrade/**"
      - "lib/**"
      - "scripts/**"
      - "server.mjs"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".dockerignore"
      - "tests/**"
      - "docs/**"
      - "README.md"
      - ".env.example"
      - "infra/aws/**"
      - ".github/workflows/aws-*.yml"

permissions:
  contents: read

concurrency:
  group: longview-aws-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the exact revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Run the locked application test suite
        run: |
          npm ci --ignore-scripts
          npm run check

      - name: Validate the Seoul CloudFormation template
        shell: bash
        run: |
          python3 -m venv "$RUNNER_TEMP/cfn-lint"
          "$RUNNER_TEMP/cfn-lint/bin/python" -m pip install \
            --disable-pip-version-check "cfn-lint==1.39.1"
          "$RUNNER_TEMP/cfn-lint/bin/cfn-lint" \
            -r ap-northeast-2 -- infra/aws/template.yaml

      - name: Build the exact production container without publishing it
        run: docker build --pull --tag "longview-aws-validation:${GITHUB_SHA}" .
